name: backend-ci

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sboss
          POSTGRES_PASSWORD: sboss_dev_password
          POSTGRES_DB: sboss_tests
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sboss -d sboss_tests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SBOSS_TEST_DATABASE: Host=localhost;Port=5432;Database=sboss_tests;Username=sboss;Password=sboss_dev_password
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Sboss.sln

      - name: Validate roadmap status
        run: python3 scripts/validate-roadmap-status.py

      - name: Build
        run: dotnet build Sboss.sln --configuration Release -warnaserror --no-restore

      - name: Test
        run: dotnet test Sboss.sln --configuration Release -warnaserror --no-build
