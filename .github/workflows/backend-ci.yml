name: backend-ci

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Sboss.sln

      - name: Build
        run: dotnet build Sboss.sln --configuration Release -warnaserror --no-restore

      - name: Test
        run: dotnet test Sboss.sln --configuration Release -warnaserror --no-build
